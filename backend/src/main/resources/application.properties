spring.application.name=cricket-tournament
server.port=${PORT:8080}

# ---------------------------------------------------------------------------
# Database
# Default: H2 in-memory (development). For production set DB_* env vars.
# MySQL example:
#   DB_URL=jdbc:mysql://localhost:3306/cricket_tournament?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#   DB_DRIVER=com.mysql.cj.jdbc.Driver
#   DB_USERNAME=root
#   DB_PASSWORD=secret
#   JPA_DIALECT=org.hibernate.dialect.MySQLDialect
#   DDL_AUTO=validate
#   H2_CONSOLE=false
# ---------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:h2:mem:cricketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=YEAR}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---------------------------------------------------------------------------
# CORS — comma-separated list of allowed origins
# ---------------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ---------------------------------------------------------------------------
# JWT
# IMPORTANT: Change JWT_SECRET to a long random string (min 32 chars) in production
# ---------------------------------------------------------------------------
app.jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-in-production-min-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------------------------------------------------------------------------
# Auth credentials — override with env vars in production
# ---------------------------------------------------------------------------
app.auth.admin.username=${ADMIN_USERNAME:admin}
app.auth.admin.password=${ADMIN_PASSWORD:cricket@2025}
app.auth.admin.name=${ADMIN_NAME:Administrator}
app.auth.scorer.username=${SCORER_USERNAME:scorer}
app.auth.scorer.password=${SCORER_PASSWORD:scorer@2025}
app.auth.scorer.name=${SCORER_NAME:Match Scorer}

# ---------------------------------------------------------------------------
# Active Spring Profile (dev seeds sample data; prod does not)
# Set SPRING_PROFILES_ACTIVE=prod in production
# ---------------------------------------------------------------------------
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
